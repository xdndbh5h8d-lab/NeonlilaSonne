<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zufälliger Joke Generator</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 15px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
            max-width: 600px;
            width: 100%;
            text-align: center;
        }

        h1 {
            color: #333;
            margin-bottom: 30px;
            font-size: 2em;
        }

        .joke-box {
            background: #f8f9fa;
            border-left: 5px solid #667eea;
            padding: 25px;
            margin: 20px 0;
            border-radius: 8px;
            min-height: 100px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2em;
            color: #333;
            line-height: 1.6;
        }

        .setup {
            font-weight: bold;
            margin-bottom: 10px;
        }

        .punchline {
            margin-top: 15px;
            color: #764ba2;
            font-style: italic;
        }

        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 30px;
            font-size: 1.1em;
            border-radius: 8px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            margin: 10px 5px;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.4);
        }

        button:active {
            transform: translateY(0);
        }

        .loading {
            color: #667eea;
            font-style: italic;
        }

        .error {
            color: #e74c3c;
            background: #ffe6e6;
            border-left-color: #e74c3c;
        }

        .joke-type {
            font-size: 0.9em;
            color: #999;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>😂 Zufälliger Joke Generator</h1>
        
        <div class="joke-box" id="jokeBox">
            <p class="loading">Klick auf "Neuen Joke laden" um zu starten!</p>
        </div>

        <button onclick="getJoke()">🎲 Neuen Joke laden</button>
        <button onclick="getRandomJoke()">⚡ Noch schneller!</button>
        
        <p class="joke-type" id="jokeType"></p>
    </div>

    <script>
        // Zwei verschiedene APIs für abwechslungsreiche Jokes
        const APIs = [
            {
                name: 'Official Joke API',
                url: 'https://official-joke-api.appspot.com/random_joke',
                parser: (data) => ({
                    setup: data.setup,
                    punchline: data.punchline,
                    type: `Kategorie: ${data.type}`
                })
            },
            {
                name: 'JokeAPI',
                url: 'https://v2.jokeapi.dev/joke/Any?format=json',
                parser: (data) => {
                    if (data.type === 'twopart') {
                        return {
                            setup: data.setup,
                            punchline: data.delivery,
                            type: `Kategorie: ${data.category}`
                        };
                    } else {
                        return {
                            setup: data.joke,
                            punchline: '',
                            type: `Kategorie: ${data.category}`
                        };
                    }
                }
            }
        ];

        async function getJoke() {
            const jokeBox = document.getElementById('jokeBox');
            const jokeTypeEl = document.getElementById('jokeType');
            
            jokeBox.innerHTML = '<p class="loading">⏳ Lädt...</p>';
            jokeTypeEl.textContent = '';

            try {
                // Wähle eine zufällige API
                const api = APIs[Math.floor(Math.random() * APIs.length)];
                
                const response = await fetch(api.url);
                if (!response.ok) throw new Error('API Error');
                
                const data = await response.json();
                const joke = api.parser(data);

                // Anzeige des Jokes
                let jokeHtml = `<div>`;
                if (joke.setup) {
                    jokeHtml += `<div class="setup">${escapeHtml(joke.setup)}</div>`;
                }
                if (joke.punchline) {
                    jokeHtml += `<div class="punchline">${escapeHtml(joke.punchline)}</div>`;
                }
                jokeHtml += `</div>`;

                jokeBox.innerHTML = jokeHtml;
                jokeTypeEl.textContent = joke.type;
                jokeTypeEl.style.color = '#667eea';

            } catch (error) {
                jokeBox.innerHTML = `<p class="error">❌ Fehler beim Laden des Jokes. Bitte versuche es später erneut.</p>`;
                jokeTypeEl.textContent = `Fehler: ${error.message}`;
            }
        }

        function getRandomJoke() {
            // Lädt mehrmals schnell hintereinander
            for (let i = 0; i < 3; i++) {
                setTimeout(() => getJoke(), i * 500);
            }
        }

        // Sicherheit: HTML-Zeichen escapen
        function escapeHtml(text) {
            const map = {
                '&': '&amp;',
                '<': '&lt;',
                '>': '&gt;',
                '"': '&quot;',
                "'": '&#039;'
            };
            return text.replace(/[&<>"']/g, m => map[m]);
        }

        // Automatisch einen Joke laden beim Start
        window.addEventListener('load', getJoke);
    </script>
</body>
</html>
